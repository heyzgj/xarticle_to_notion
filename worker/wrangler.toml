name = "x2notion-oauth"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
NOTION_CLIENT_ID = "33ad872b-594c-8151-aa61-0037f0ff538b"
# NOTION_CLIENT_SECRET goes in wrangler secrets, not here
# REQUIRED before deploy: comma-separated extension IDs allowed to receive tokens.
# Add BOTH your unpacked dev ID (from chrome://extensions) and the published Web
# Store ID. If empty/placeholder, the worker rejects every request (fail closed).
ALLOWED_EXTENSION_IDS = "REPLACE_WITH_YOUR_EXTENSION_ID"
