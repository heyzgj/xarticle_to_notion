name = "x2notion-oauth"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
NOTION_CLIENT_ID = "33ad872b-594c-8151-aa61-0037f0ff538b"
# NOTION_CLIENT_SECRET goes in wrangler secrets, not here.
# Comma-separated extension IDs allowed to receive tokens (fail-closed if empty).
# This is the published Chrome Web Store ID. If you also `Load unpacked` the dist/
# folder for local dev, append that path-derived ID here too (comma-separated).
ALLOWED_EXTENSION_IDS = "efmjddojjamakjnhmnjidonbbkkgmama"
